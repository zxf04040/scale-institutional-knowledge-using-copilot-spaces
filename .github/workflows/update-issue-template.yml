name: Update Issue Template Options

on:
  push:
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-options:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Update issue template
        run: python .github/scripts/update_issue_template.py

      - name: Commit updated template
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ -n "$(git status --porcelain .github/ISSUE_TEMPLATE/add-update-content-to-process-docs.yml)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/ISSUE_TEMPLATE/add-update-content-to-process-docs.yml
            git commit -m "chore: update issue template options from docs/*"
            if git push origin HEAD:main; then
              echo "Pushed updated template to main"
            else
              branch="issue-template-sync-$(date +%Y%m%d%H%M%S)"
              export branch
              git push origin "HEAD:${branch}"
              python3 -c "import json, os, urllib.request; repo=os.environ['GITHUB_REPOSITORY']; token=os.environ['GITHUB_TOKEN']; branch=os.environ['branch']; api_url=f'https://api.github.com/repos/{repo}/pulls'; payload=json.dumps({'title':'chore: sync issue template dropdown options with docs/*','head':branch,'base':'main','body':'This pull request updates the issue template dropdown options to match current docs/*.md.'}); req=urllib.request.Request(api_url, data=payload.encode('utf-8'), headers={'Authorization':f'token {token}','Accept':'application/vnd.github+json','Content-Type':'application/json'}); print(urllib.request.urlopen(req).read().decode('utf-8'))"
            fi
          else
            echo "No changes to commit"
          fi
